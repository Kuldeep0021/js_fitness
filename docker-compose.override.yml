version: '3.8'

services:
  # Override backend for local development: mount source and run nodemon
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app:cached
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/jsfitness
      - JWT_SECRET=dev_secret_change_me
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - '5000:5000'
    command: sh -c "npm install --no-audit --no-fund && npx nodemon --watch . --exec node server.js"
    depends_on:
      - mongo
