
version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: jsfitness-mongo-dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data_dev:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jsfitness-backend-dev
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - ./backend:/app:cached
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/jsfitness
      - JWT_SECRET=dev_secret_change_me
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongo

  seed:
    image: node:18-alpine
    container_name: jsfitness-seed
    working_dir: /app
    volumes:
      - ./backend:/app:ro
    environment:
      - SEED=true
      - MONGO_URI=mongodb://mongo:27017/jsfitness
    depends_on:
      - mongo
    # Wait for Mongo to accept connections then run seed.js
    command: sh -c "node -e \"(async()=>{const mongoose=require('mongoose');const uri=process.env.MONGO_URI;for(let i=0;i<60;i++){try{await mongoose.connect(uri,{serverSelectionTimeoutMS:2000});console.log('mongo ready');break;}catch(e){console.log('waiting for mongo',i);await new Promise(r=>setTimeout(r,1000));}}require('./seed.js');process.exit(0)})();\""

volumes:
  mongo_data_dev:
    name: jsfitness_mongo_data_dev
