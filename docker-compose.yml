version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: jsfitness-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jsfitness-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    name: jsfitness_mongo_data
